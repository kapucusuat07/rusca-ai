<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Rusça Çeviri PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.container{
width:100%;
max-width:550px;
background:rgba(255,255,255,0.07);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(14px);
padding:25px;
border-radius:30px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:25px;
font-size:30px;
background:linear-gradient(to right,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

textarea{
width:100%;
height:150px;
padding:18px;
border:none;
outline:none;
resize:none;
font-size:17px;
color:white;
background:rgba(255,255,255,0.08);
border-radius:20px;
margin-bottom:20px;
}

textarea::placeholder{
color:#cbd5e1;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:17px;
font-weight:bold;
background:linear-gradient(to right,#2563eb,#7c3aed);
color:white;
cursor:pointer;
transition:0.3s;
margin-bottom:15px;
}

button:hover{
transform:scale(1.03);
}

.result-box{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:20px;
margin-top:10px;
}

.label{
font-size:14px;
opacity:0.7;
margin-bottom:8px;
}

.result{
font-size:22px;
line-height:1.5;
word-break:break-word;
}

.loading{
text-align:center;
margin-top:10px;
font-size:14px;
color:#93c5fd;
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
opacity:0.6;
}
</style>
</head>
<body>

<div class="container">
<h1>🇷🇺 AI Rusça Çeviri PRO</h1>

<textarea id="inputText" placeholder="Türkçe metin yaz..."></textarea>

<button onclick="translateText()">ÇEVİR</button>

<div class="loading" id="loading"></div>

<div class="result-box">
<div class="label">Rusça Çeviri</div>
<div class="result" id="resultText">-</div>

<div class="label" style="margin-top:15px;">Latin Okunuş</div>
<div class="result" id="latinText">-</div>
</div>

<button onclick="speakRussian()">🔊 Sesli Oku</button>

<div class="footer">
AI Translation System PRO
</div>
</div>

<script>
const transliterationMap = {
'а':'a','б':'b','в':'v','г':'g','д':'d',
'е':'e','ё':'yo','ж':'zh','з':'z','и':'i',
'й':'y','к':'k','л':'l','м':'m','н':'n',
'о':'o','п':'p','р':'r','с':'s','т':'t',
'у':'u','ф':'f','х':'h','ц':'ts','ч':'ch',
'ш':'sh','щ':'sch','ъ':'','ы':'i','ь':'',
'э':'e','ю':'yu','я':'ya',' ':' '
};

function transliterate(text){
return text
.toLowerCase()
.split('')
.map(char => transliterationMap[char] || char)
.join('');
}

async function translateText(){
const input = document.getElementById('inputText').value.trim();

if(!input){
alert('Metin gir');
return;
}

const loading = document.getElementById('loading');
const result = document.getElementById('resultText');

loading.innerText = 'Çevriliyor...';
result.innerText = '-';
document.getElementById('latinText').innerText = '-';

try{
const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(input)}&langpair=tr|ru`;

const response = await fetch(url);
const data = await response.json();

if(data.responseData && data.responseData.translatedText){
result.innerText = data.responseData.translatedText;

const latin = transliterate(data.responseData.translatedText);
document.getElementById('latinText').innerText = latin;

loading.innerText = '';
}else{
loading.innerText = 'Çeviri alınamadı';
}

}
catch(error){
loading.innerText = 'İnternet veya API hatası';
console.log(error);
}
}

function speakRussian(){
const text = document.getElementById('resultText').innerText;

if(text === '-') return;

const speech = new SpeechSynthesisUtterance(text);
speech.lang = 'ru-RU';
speech.rate = 0.9;

speechSynthesis.speak(speech);
}
</script>

</body>
</html>
