<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Translator PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1e293b
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;

}

.container{

width:100%;
max-width:700px;

background:
rgba(255,255,255,0.07);

border:
1px solid rgba(255,255,255,0.1);

backdrop-filter:blur(14px);

padding:25px;

border-radius:30px;

box-shadow:
0 0 40px rgba(0,0,0,0.5);

}

.top-menu{

display:flex;
gap:10px;
margin-bottom:20px;

}

.top-menu button{
flex:1;
}

h1{

text-align:center;
margin-bottom:25px;
font-size:32px;

background:
linear-gradient(
to right,
#60a5fa,
#a78bfa
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

textarea{

width:100%;
height:140px;

padding:18px;

border:none;
outline:none;
resize:none;

font-size:17px;
color:white;

background:
rgba(255,255,255,0.08);

border-radius:20px;

margin-bottom:20px;

}

textarea::placeholder{
color:#cbd5e1;
}

button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

font-size:17px;
font-weight:bold;

background:
linear-gradient(
to right,
#2563eb,
#7c3aed
);

color:white;

cursor:pointer;

margin-bottom:15px;

}

.result-box{

background:
rgba(255,255,255,0.06);

padding:18px;

border-radius:20px;

margin-top:10px;

}

.result{

font-size:20px;
margin-top:10px;
margin-bottom:10px;

}

.favorite-item{

padding:12px;

margin-top:10px;

background:
rgba(255,255,255,0.05);

border-radius:14px;

}

.favorite-text{
margin-top:5px;
}

.loading{

margin-top:10px;
margin-bottom:10px;

}

</style>

</head>

<body>

<div class="container">

<div class="top-menu">

<button onclick="showHome()">
🏠 Ana Sayfa
</button>

<button onclick="showFavoritesPage()">
⭐ Favoriler
</button>

<button onclick="showWordsPage()">
📚 Kelimeler
</button>

</div>

<div id="homePage">

<h1>
🌍 AI Translator PRO
</h1>

<textarea
id="inputText"
placeholder="Türkçe metin yaz...">
</textarea>

<button onclick="translateText()">
ÇEVİR
</button>

<button onclick="saveFavorite()">
⭐ Favorilere Kaydet
</button>

<div
class="loading"
id="loading">
</div>

<div class="result-box">

<div class="result"
id="russianText">
-
</div>

<div class="result"
id="russianLatin">
-
</div>

<div class="result"
id="englishText">
-
</div>

<div class="result"
id="englishLatin">
-
</div>

</div>

<button onclick="speakRussian()">
🔊 Rusça Oku
</button>

<button onclick="speakEnglish()">
🔊 İngilizce Oku
</button>

</div>

<div
id="favoritesPage"
style="display:none;">

<h1>
⭐ Favoriler
</h1>

<div class="result-box">

<div id="favoritesList">
Henüz favori yok
</div>

</div>

</div>

<div
id="wordsPage"
style="display:none;">

<h1>
📚 Kelime Listesi
</h1>

<div
class="result-box"
id="wordsList">

Yükleniyor...

</div>

</div>

</div>

<script>

const transliterationMap = {

'а':'a',
'б':'b',
'в':'v',
'г':'g',
'д':'d',
'е':'e',
'ё':'yo',
'ж':'zh',
'з':'z',
'и':'i',
'й':'y',
'к':'k',
'л':'l',
'м':'m',
'н':'n',
'о':'o',
'п':'p',
'р':'r',
'с':'s',
'т':'t',
'у':'u',
'ф':'f',
'х':'h',
'ц':'ts',
'ч':'ch',
'ш':'sh',
'щ':'sch',
'ъ':'',
'ы':'i',
'ь':'',
'э':'e',
'ю':'yu',
'я':'ya',
' ':' '

};

let defaultWords = [];

async function loadWordsFromFile(){

const list =
document.getElementById(
'wordsList'
);

try{

const response =
await fetch('./kelimeler.json');

if(!response.ok){

list.innerHTML =
'kelimeler.json bulunamadı';

return;

}

defaultWords =
await response.json();

if(!Array.isArray(defaultWords)){

list.innerHTML =
'JSON formatı hatalı';

return;

}

loadWordsPage();

}catch(error){

console.log(error);

list.innerHTML =
'Kelime dosyası yüklenemedi';

}

}

function transliterate(text){

return text
.toLowerCase()
.split('')
.map(char =>
transliterationMap[char] || char)
.join('');

}

function englishPronunciation(text){

return text
.toLowerCase()
.replace(/th/g,'d')
.replace(/w/g,'v');

}

async function translateText(){

const input =
document.getElementById(
'inputText'
).value.trim();

if(!input){

alert('Metin gir');

return;

}

const loading =
document.getElementById(
'loading'
);

loading.innerText =
'Çevriliyor...';

try{

const russianUrl =
`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input)}&langpair=tr|ru`;

const englishUrl =
`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input)}&langpair=tr|en`;

const [
ruResponse,
enResponse
] = await Promise.all([

fetch(russianUrl),
fetch(englishUrl)

]);

const ruData =
await ruResponse.json();

const enData =
await enResponse.json();

const russian =
ruData.responseData.translatedText;

const english =
enData.responseData.translatedText;

document.getElementById(
'russianText'
).innerText =
'🇷🇺 ' + russian;

document.getElementById(
'russianLatin'
).innerText =
'🔤 ' + transliterate(russian);

document.getElementById(
'englishText'
).innerText =
'🇺🇸 ' + english;

document.getElementById(
'englishLatin'
).innerText =
'🔤 ' + englishPronunciation(english);

loading.innerText='';

}catch(error){

loading.innerText =
'Çeviri hatası';

console.log(error);

}

}

function speakRussian(){

const text =
document.getElementById(
'russianText'
).innerText;

if(text==='-') return;

speechSynthesis.cancel();

const speech =
new SpeechSynthesisUtterance(text);

speech.lang='ru-RU';

speechSynthesis.speak(speech);

}

function speakEnglish(){

const text =
document.getElementById(
'englishText'
).innerText;

if(text==='-') return;

speechSynthesis.cancel();

const speech =
new SpeechSynthesisUtterance(text);

speech.lang='en-US';

speechSynthesis.speak(speech);

}

function saveFavorite(){

const input =
document.getElementById(
'inputText'
).value.trim();

const russian =
document.getElementById(
'russianText'
).innerText;

const english =
document.getElementById(
'englishText'
).innerText;

if(russian==='-' || english==='-'){

alert('Önce çeviri yap');

return;

}

const favorites =
JSON.parse(
localStorage.getItem(
'favorites'
) || '[]'
);

favorites.push({

turkish: input,
russian,
english

});

localStorage.setItem(
'favorites',
JSON.stringify(favorites)
);

showFavorites();

}

function addDefaultToFavorites(index){

const favorites =
JSON.parse(
localStorage.getItem(
'favorites'
) || '[]'
);

favorites.push(
defaultWords[index]
);

localStorage.setItem(
'favorites',
JSON.stringify(favorites)
);

showFavorites();

alert(
'Favorilere eklendi'
);

}

function showFavorites(){

const favorites =
JSON.parse(
localStorage.getItem(
'favorites'
) || '[]'
);

const list =
document.getElementById(
'favoritesList'
);

if(favorites.length===0){

list.innerHTML =
'Henüz favori yok';

return;

}

list.innerHTML='';

favorites.forEach((item,index)=>{

list.innerHTML += `

<div class="favorite-item">

<div class="favorite-text">
🇹🇷 ${item.turkish}
</div>

<div class="favorite-text">
🇷🇺 ${item.russian}
</div>

<div class="favorite-text">
🇺🇸 ${item.english}
</div>

<button
onclick="deleteFavorite(${index})">
🗑 Sil
</button>

</div>

`;

});

}

function loadWordsPage(){

const list =
document.getElementById(
'wordsList'
);

if(!defaultWords.length){

list.innerHTML =
'Kelime bulunamadı';

return;

}

list.innerHTML='';

defaultWords.forEach((item,index)=>{

list.innerHTML += `

<div class="favorite-item">

<div class="favorite-text">
🇹🇷 ${item.turkish}
</div>

<div class="favorite-text">
🇷🇺 ${item.russian}
</div>

<div class="favorite-text">
🔤 ${item.russianLatin}
</div>

<div class="favorite-text">
🇺🇸 ${item.english}
</div>

<div class="favorite-text">
🔤 ${item.englishLatin}
</div>

<button
onclick="addDefaultToFavorites(${index})">
⭐ Favorilere Ekle
</button>

</div>

`;

});

}

function showHome(){

document.getElementById(
'homePage'
).style.display='block';

document.getElementById(
'favoritesPage'
).style.display='none';

document.getElementById(
'wordsPage'
).style.display='none';

}

function showFavoritesPage(){

document.getElementById(
'homePage'
).style.display='none';

document.getElementById(
'favoritesPage'
).style.display='block';

document.getElementById(
'wordsPage'
).style.display='none';

}

function showWordsPage(){

document.getElementById(
'homePage'
).style.display='none';

document.getElementById(
'favoritesPage'
).style.display='none';

document.getElementById(
'wordsPage'
).style.display='block';

}

loadWordsFromFile();

showFavorites();

</script>

</body>
</html>
